name: Release

on:
  workflow_run:
    workflows: ["Package"]
    types: [completed]
    branches: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
      dry_run:
        description: 'Dry run (skip publish steps)'
        type: boolean
        default: false

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:

  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          V="${{ env.VERSION }}"
          V="${V#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      # ── Download artifacts from Package workflow ──────────────────────────
      - uses: actions/download-artifact@v4
        with:
          name: slogr-agent-jar
          path: dist/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: slogr-agent-rpm
          path: dist/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: slogr-agent-deb
          path: dist/
        continue-on-error: true

      # ── Publish RPM + DEB to Buildkite Package Registries ────────────────
      - name: Push packages to Buildkite Package Registries
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -z "$PACKAGECLOUD_TOKEN" ]; then
            echo "PACKAGECLOUD_TOKEN not set — skipping Buildkite package registry publish"
            exit 0
          fi
          gem install package_cloud --no-document -q
          # RPM — covers RHEL 8/9, CentOS Stream, Amazon Linux 2023, Fedora
          package_cloud push slogr/agent-rpm/el/8  dist/slogr-agent-*.rpm || true
          package_cloud push slogr/agent-rpm/el/9  dist/slogr-agent-*.rpm || true
          # DEB — covers Ubuntu 20.04 (focal), 22.04 (jammy), Debian 12 (bookworm)
          package_cloud push slogr/agent-deb/ubuntu/focal     dist/slogr-agent_*.deb || true
          package_cloud push slogr/agent-deb/ubuntu/jammy     dist/slogr-agent_*.deb || true
          package_cloud push slogr/agent-deb/debian/bookworm  dist/slogr-agent_*.deb || true
        env:
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}

      # ── Publish to S3 release bucket ──────────────────────────────────────
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_ROLE_ARN }}
          aws-region: us-east-1

      - name: Publish artifacts to S3
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          V=${{ steps.ver.outputs.version }}
          aws s3 cp dist/ s3://releases.slogr.io/agent/$V/ \
            --recursive \
            --acl public-read \
            --cache-control "max-age=31536000,immutable"
          echo "Published to s3://releases.slogr.io/agent/$V/"

      # ── Publish Docker image to ECR ───────────────────────────────────────
      - name: Login to Amazon ECR
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push to ECR
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          V=${{ steps.ver.outputs.version }}
          ECR="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/slogr/agent"
          docker pull slogr/agent:$V
          docker tag  slogr/agent:$V $ECR:$V
          docker tag  slogr/agent:$V $ECR:latest
          docker push $ECR:$V
          docker push $ECR:latest

      # ── Create GitHub release ─────────────────────────────────────────────
      - name: Create GitHub release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Slogr Agent v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/slogr-agent-all.jar
            dist/slogr-agent-*.rpm
            dist/slogr-agent_*.deb
            install.sh

      # ── Publish Helm chart to ghcr.io OCI registry ───────────────────────
      - name: Install Helm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Package and push Helm chart
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          V=${{ steps.ver.outputs.version }}
          helm package packaging/helm --version "$V" --app-version "$V" -d dist/
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push dist/slogr-agent-${V}.tgz oci://ghcr.io/slogr/charts

      # ── Update Homebrew tap formula ───────────────────────────────────────
      - name: Update Homebrew tap
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          V=${{ steps.ver.outputs.version }}
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/slogr/homebrew-tap.git" /tmp/homebrew-tap
          cp packaging/homebrew/slogr-agent.rb /tmp/homebrew-tap/Formula/slogr-agent.rb
          # Update version in formula
          sed -i "s/version \".*\"/version \"${V}\"/" /tmp/homebrew-tap/Formula/slogr-agent.rb
          cd /tmp/homebrew-tap
          git config user.email "bot@slogr.io"
          git config user.name "Slogr Release Bot"
          git add Formula/slogr-agent.rb
          git commit -m "chore: update slogr-agent to v${V}"
          git push

      # ── Push Chocolatey package ───────────────────────────────────────────
      - name: Push Chocolatey package
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          V=${{ steps.ver.outputs.version }}
          # Update version in nuspec
          sed -i "s/<version>.*<\/version>/<version>${V}<\/version>/" \
            packaging/chocolatey/slogr-agent.nuspec
          choco pack packaging/chocolatey/slogr-agent.nuspec --outputdirectory dist/
          choco push dist/slogr-agent.${V}.nupkg \
            --source https://push.chocolatey.org/ \
            --api-key ${{ secrets.CHOCOLATEY_API_KEY }}
