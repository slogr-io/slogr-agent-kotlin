name: CI

on:
  push:
    branches: [ "main", "develop", "phase-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build
        working-directory: agent-kotlin
        run: ./gradlew build -x test

      - name: Unit tests
        working-directory: agent-kotlin
        run: ./gradlew test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: agent-kotlin/**/build/reports/tests/

      - name: Verify version command
        working-directory: agent-kotlin
        run: |
          java -jar app/build/libs/slogr-agent-all.jar version | grep "1\.0\.0"
