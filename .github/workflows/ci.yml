name: Slogr Agent CI

on:
  push:
    branches: [master, main, R2]
  pull_request:
    branches: [master, main, R2]
  workflow_dispatch:

jobs:
  # ── Build, test, and upload compiled artifacts ─────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      # gcc only — musl-tools must NOT be installed here as it interferes
      # with the glibc native build and causes UnsatisfiedLinkError in JNI tests
      - name: Install native build dependencies
        run: sudo apt-get install -y --no-install-recommends gcc

      - name: Build native library (glibc)
        run: make -C native JAVA_HOME=$JAVA_HOME

      - name: Run unit tests
        run: ./gradlew test
        env:
          SLOGR_NATIVE_DIR: ${{ github.workspace }}/native/build

      - name: Build fat JAR
        run: ./gradlew shadowJar

      - name: Verify JAR
        run: |
          java -jar app/build/libs/slogr-agent-all.jar version
          java -jar app/build/libs/slogr-agent-all.jar status

      # Upload JAR so build-image can skip ./gradlew shadowJar entirely
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slogr-build-artifacts
          path: app/build/libs/slogr-agent-all.jar
          retention-days: 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'

  # ── Build Docker image from pre-built artifacts (no Gradle, no make) ───────
  build-image:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Install native build dependencies
        run: sudo apt-get install -y --no-install-recommends gcc musl-tools

      # Build musl variant for Alpine Docker image
      - name: Build native library (musl)
        run: |
          make -C native JAVA_HOME=$JAVA_HOME MUSL=1
          mkdir -p native/libs
          cp native/build/libslogr-native-musl.so \
             native/libs/libslogr-native-linux-amd64-musl.so

      # Download pre-built JAR from test job — no need to run ./gradlew shadowJar again
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: slogr-build-artifacts
          path: app/build/libs/

      - name: Build Docker image
        run: docker build -f Dockerfile.ci -t slogr-agent:test .

      - name: Save Docker image as artifact
        run: docker save slogr-agent:test | gzip > /tmp/slogr-agent-test.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: slogr-agent-image
          path: /tmp/slogr-agent-test.tar.gz
          retention-days: 1

  # ── E2E tests — re-run this job alone to skip the Docker build ─────────────
  run-e2e:
    needs: build-image
    runs-on: ubuntu-latest

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: slogr-agent-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/slogr-agent-test.tar.gz

      - name: Create test network
        run: docker network create slogr-test-net

      # ── Agent B: TWAMP reflector ──────────────────────────────
      - name: Start Agent B (reflector)
        run: |
          docker run -d \
            --name agent-b \
            --network slogr-test-net \
            --cap-add NET_RAW \
            --cap-add NET_BIND_SERVICE \
            slogr-agent:test daemon

          echo "Waiting for Agent B TWAMP reflector to be ready..."

          # Poll up to 30s for "TWAMP reflector listening" in Agent B logs
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(docker inspect -f '{{.State.Status}}' agent-b)
            if [ "$STATUS" != "running" ]; then
              echo "❌ Agent B exited unexpectedly (status: $STATUS)"
              docker logs agent-b
              exit 1
            fi
            if docker logs agent-b 2>&1 | grep -q "TWAMP reflector listening"; then
              echo "✅ Agent B TWAMP reflector is ready"
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            sleep 1
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ Agent B TWAMP reflector did not start within 30 seconds"
            docker logs agent-b
            exit 1
          fi

      # ── Test 1: TWAMP A → B ──────────────────────────────────
      - name: "E2E: TWAMP check A → B"
        run: |
          AGENT_B_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' agent-b)
          echo "Agent B IP: $AGENT_B_IP"

          docker run --rm \
            --network slogr-test-net \
            --cap-add NET_RAW \
            --cap-add NET_BIND_SERVICE \
            slogr-agent:test check "$AGENT_B_IP"

          echo "✅ TWAMP A → B passed"

      # ── Test 2: TWAMP A → B (JSON, validate fields) ─────────
      - name: "E2E: TWAMP check A → B (JSON validation)"
        run: |
          AGENT_B_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' agent-b)

          docker run --rm \
            --network slogr-test-net \
            --cap-add NET_RAW \
            --cap-add NET_BIND_SERVICE \
            slogr-agent:test check "$AGENT_B_IP" --format json > /tmp/twamp.json

          python3 -c "
          import json, sys
          with open('/tmp/twamp.json') as f:
              data = json.load(f)

          checks = {
            'has_rtt': 'fwd_avg_rtt_ms' in str(data),
            'has_packets': 'packets_sent' in str(data),
            'has_grade': 'grade' in str(data),
            'valid_json': True
          }

          failed = [k for k, v in checks.items() if not v]
          if failed:
            print(f'❌ Failed checks: {failed}')
            sys.exit(1)

          print('✅ JSON validation passed')
          print(json.dumps(data, indent=2)[:500])
          "

      # ── Test 3: Bidirectional TWAMP (B → A) ─────────────────
      - name: Start Agent A (for reverse test)
        run: |
          docker run -d \
            --name agent-a \
            --network slogr-test-net \
            --cap-add NET_RAW \
            --cap-add NET_BIND_SERVICE \
            slogr-agent:test daemon

          sleep 3

      - name: "E2E: TWAMP check B → A (bidirectional)"
        run: |
          AGENT_A_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' agent-a)
          echo "Agent A IP: $AGENT_A_IP"

          docker run --rm \
            --network slogr-test-net \
            --cap-add NET_RAW \
            --cap-add NET_BIND_SERVICE \
            slogr-agent:test check "$AGENT_A_IP"

          echo "✅ Bidirectional TWAMP B → A passed"

      # ── Test 4: ICMP/TCP fallback (non-TWAMP target) ────────
      - name: "E2E: ICMP/TCP fallback (non-TWAMP target)"
        run: |
          # Start a simple HTTP server as a non-TWAMP target
          docker run -d \
            --name target-http \
            --network slogr-test-net \
            python:3-slim python3 -m http.server 443

          sleep 2

          TARGET_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' target-http)
          echo "HTTP target IP: $TARGET_IP"

          # This should fall back to ICMP/TCP since target has no TWAMP
          docker run --rm \
            --network slogr-test-net \
            --cap-add NET_RAW \
            --cap-add NET_BIND_SERVICE \
            slogr-agent:test check "$TARGET_IP" || true

          echo "✅ Fallback test completed (non-zero exit OK — ICMP may be filtered in Docker)"

      # ── Test 5: Multiple concurrent sessions ────────────────
      - name: "E2E: Multiple concurrent TWAMP checks"
        run: |
          AGENT_B_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' agent-b)

          # Run 5 concurrent TWAMP checks against Agent B
          for i in 1 2 3 4 5; do
            docker run -d \
              --name "checker-$i" \
              --network slogr-test-net \
              --cap-add NET_RAW \
              --cap-add NET_BIND_SERVICE \
              slogr-agent:test check "$AGENT_B_IP"
          done

          # Wait for all to complete
          FAILED=0
          for i in 1 2 3 4 5; do
            EXIT_CODE=$(docker wait "checker-$i")
            if [ "$EXIT_CODE" != "0" ]; then
              echo "❌ Checker $i failed (exit: $EXIT_CODE)"
              docker logs "checker-$i"
              FAILED=1
            fi
          done

          if [ "$FAILED" = "0" ]; then
            echo "✅ All 5 concurrent TWAMP sessions passed"
          else
            echo "❌ Some concurrent sessions failed"
            exit 1
          fi

      # ── Test 6: Agent version and status inside container ───
      - name: "E2E: Version and status commands"
        run: |
          VERSION=$(docker run --rm slogr-agent:test version)
          echo "Version: $VERSION"

          STATUS=$(docker run --rm slogr-agent:test status)
          echo "Status: $STATUS"

          # Verify version string is present
          echo "$VERSION" | grep -q "slogr-agent" || { echo "❌ Version check failed"; exit 1; }
          echo "✅ Version and status commands passed"

      # ── Cleanup ─────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          docker stop agent-a agent-b target-http checker-1 checker-2 checker-3 checker-4 checker-5 2>/dev/null || true
          docker rm agent-a agent-b target-http checker-1 checker-2 checker-3 checker-4 checker-5 2>/dev/null || true
          docker network rm slogr-test-net 2>/dev/null || true
