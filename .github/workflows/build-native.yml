name: Build Native Library

on:
  push:
    branches: [ "main", "phase-2", "phase-3" ]
    paths:
      - "agent-kotlin/native/**"
  workflow_dispatch:

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            target: linux-amd64
            cc: gcc
          - os: ubuntu-latest
            arch: amd64
            target: linux-amd64-musl
            cc: musl-gcc
            musl: "1"
          - os: ubuntu-latest
            arch: arm64
            target: linux-arm64
            cc: aarch64-linux-gnu-gcc

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Amazon Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Install musl toolchain
        if: matrix.musl == '1'
        run: sudo apt-get install -y musl-tools

      - name: Install arm64 cross-compiler
        if: matrix.arch == 'arm64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build native library
        working-directory: agent-kotlin/native
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          make CC=${{ matrix.cc }} ARCH=${{ matrix.arch }} ${{ matrix.musl && 'MUSL=1' || '' }}
          ls -la build/

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: libslogr-native-${{ matrix.target }}
          path: agent-kotlin/native/build/libslogr-native*.so
          retention-days: 30
