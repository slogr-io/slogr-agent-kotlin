name: Notify slogr-cicd
on:
  release:
    types: [published]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CICD_DISPATCH_TOKEN }}
          repository: nasimkz/slogr-cicd
          event-type: release-published
          client-payload: '{"repo": "slogr-agent-kotlin", "version": "${{ github.event.release.tag_name }}", "sha": "${{ github.sha }}"}'
